name: gymgyme
options:
  bundleIdPrefix: com.damla
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
targets:
  gymgyme:
    type: application
    platform: iOS
    sources:
      - gymgyme
      - Shared
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: gymgyme
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: gymgyme/gymgyme.entitlements
        CODE_SIGN_IDENTITY: "iPhone Developer"
        PRODUCT_BUNDLE_IDENTIFIER: com.damla.gymgyme
    dependencies:
      - target: gymgymeWidgetExtension

  gymgymeWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - gymgymeWidget
      - Shared
    info:
      path: gymgymeWidget/Info.plist
      properties:
        CFBundleDisplayName: gymgyme Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.damla.gymgyme.widget
        CODE_SIGN_ENTITLEMENTS: gymgymeWidget/gymgymeWidget.entitlements
        CODE_SIGN_IDENTITY: "iPhone Developer"
        SWIFT_EMIT_LOC_STRINGS: YES
